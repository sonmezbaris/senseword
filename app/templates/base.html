<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SenseWord{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <header class="navbar">
        <a class="brand" href="/">SenseWord</a>
        <nav>
            <a href="/exam">Deneme Sınavı</a>
            {% if user %}
                <a href="/dashboard">Dashboard</a>
                <a href="/study">Study</a>
                <a href="/paths">Paths</a>
                <a href="/vocabulary">Words</a>
                <a href="/review">Review</a>
                <a href="/vocabulary/add">+ Add</a>
                <a class="muted" href="/logout">Logout</a>
            {% else %}
                <a class="nav-link" href="/register">Register</a>
                <a class="btn btn-primary btn-small nav-signin" href="/login">Sign in</a>
            {% endif %}
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>SenseWord — learn vocabulary with all your senses.</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
