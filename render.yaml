# Render Blueprint — one-click deploy (web service + free Postgres) from GitHub.
# https://render.com/docs/blueprint-spec
databases:
  - name: senseword-db
    plan: free
    databaseName: senseword
    user: senseword
    region: frankfurt

services:
  - type: web
    name: senseword
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Persistent Postgres so user accounts/progress survive redeploys.
      # Render injects the connection string; the app normalizes the scheme.
      - key: DATABASE_URL
        fromDatabase:
          name: senseword-db
          property: connectionString
