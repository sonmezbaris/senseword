# Render Blueprint — one-click deploy from GitHub.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: senseword
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # SQLite resets on every redeploy (ephemeral disk). The catalog re-seeds
      # automatically on startup. For persistent users/progress, set DATABASE_URL
      # to a managed Postgres URL instead, e.g.:
      # - key: DATABASE_URL
      #   value: postgresql+psycopg://user:pass@host:5432/senseword
